name: Database Backup

on:
  schedule:
    - cron: '0 6 * * *'   # Diario a las 6 AM UTC (1 AM Colombia)
  workflow_dispatch:        # Permite disparo manual desde GitHub

jobs:
  backup:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Dump database (PostgreSQL 17 via Docker)
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          TIMESTAMP=$(date +%Y-%m-%d_%H-%M-%S)
          FILENAME="cafe-de-mi-tierra_${TIMESTAMP}.sql"
          docker run --rm \
            -e DATABASE_URL="$DATABASE_URL" \
            postgres:17-alpine \
            pg_dump "$DATABASE_URL" --no-owner --no-acl > "${FILENAME}"
          gzip "${FILENAME}"
          echo "BACKUP_FILE=${FILENAME}.gz" >> $GITHUB_ENV
          echo "✅ Backup generado:"
          ls -lh "${FILENAME}.gz"

      - name: Upload backup as artifact
        uses: actions/upload-artifact@v4
        with:
          name: backup-${{ github.run_number }}-${{ github.run_attempt }}
          path: "*.sql.gz"
          retention-days: 30
          if-no-files-found: error

      - name: Notify success
        run: echo "🗄️ Backup completado — retenido 30 días en GitHub Actions"
